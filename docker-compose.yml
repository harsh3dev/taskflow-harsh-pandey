services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Migrations ───────────────────────────────────────────────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?sslmode=disable"
      - "up"
    volumes:
      - ./backend/db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Seed ─────────────────────────────────────────────────────────────────────
  seed:
    image: postgres:16-alpine
    command: >
      psql
      postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?sslmode=disable
      -f /seed.sql
    volumes:
      - ./backend/db/seeds/001_seed.sql:/seed.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  postgres_data:
