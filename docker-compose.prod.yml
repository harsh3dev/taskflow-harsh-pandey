# Production stack. Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Backend: compiled Go binary in a minimal Alpine image.
# Frontend: Vite production build served by nginx; /api/* proxied to backend.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    environment:
      DATABASE_URL:      postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}?sslmode=disable
      BACKEND_PORT:      ${BACKEND_PORT:-8080}
      APP_ENV:           production
      JWT_SIGNING_KEYS:  ${JWT_SIGNING_KEYS}
      JWT_ACTIVE_KEY_ID: ${JWT_ACTIVE_KEY_ID}
      JWT_ISSUER:        ${JWT_ISSUER:-taskflow}
      JWT_AUDIENCE:      ${JWT_AUDIENCE:-taskflow-api}
      ACCESS_TOKEN_TTL:  ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
      BCRYPT_COST:       ${BCRYPT_COST:-12}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
