root    = "."
tmp_dir = "tmp"

[build]
  cmd         = "go build -o ./tmp/main ./cmd/api"
  bin         = "./tmp/main"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "db", "testdata"]
  delay       = 500          # ms to wait after a change before rebuilding

[log]
  time = true

[color]
  build  = "green"
  runner = "magenta"
  watcher = "cyan"
  main   = "yellow"

[misc]
  clean_on_exit = true
